services:
  gpt-reg:
    build:
      context: .
    container_name: gpt-reg
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3030
      BROWSER_DISPLAY: ":1"
      BROWSER_COMMAND: "chromium --no-sandbox"
      VNC_WEB_URL: "http://127.0.0.1:6080/vnc.html?autoconnect=1&resize=remote"
      VNC_PORT: "5901"
      NOVNC_PORT: "6080"
      VNC_RESOLUTION: "1440x900x24"
    volumes:
      - ./.env:/app/.env
      - ./purchase_config.json:/app/purchase_config.json
      - ./data:/app/data
